spring.application.name=Bai5
spring.datasource.url=jdbc:mysql://localhost:3306/test_db?createDatabaseIfNotExist=true

# Tài khoản và mật khẩu của MySQL database
spring.datasource.username=root
spring.datasource.password=123456

# Driver điều khiển
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tự động cập nhật cấu hình bảng dựa trên Entity Java
spring.jpa.hibernate.ddl-auto=update
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%p","thread":"%t","requestId":"%X{requestId}","logger":"%c","message":"%m","exception":"%wEx"}%n